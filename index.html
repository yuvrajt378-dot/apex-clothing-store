<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>APEX Store</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="navbar">

<div class="logo">APEX</div>

<nav class="nav-links">
<a data-category="all">All</a>
<a data-category="anime">Anime</a>
<a data-category="marvel">Marvel</a>
<a data-category="dc">DC</a>
</nav>

<div class="nav-right">

<input type="text" id="searchInput" placeholder="Search products">

<button onclick="toggleDarkMode()" class="dark-btn">🌙</button>

<a href="login.html" class="login-btn">Login</a>

<a href="cart.html">
Cart (<span id="cart-count">0</span>)
</a>

</div>

</header>


<section class="hero">

<div class="hero-content">
<h1>Anime Streetwear</h1>
<p>Premium clothing inspired by your favorite characters</p>
<button onclick="window.location='#products'">Shop Now</button>
</div>

</section>


<section id="products" class="products">

<h2>All Products</h2>

<div id="product-grid" class="product-grid"></div>

</section>


<div id="quick-view" class="quick-view">

<div class="quick-view-content">

<span id="close-quick-view">×</span>

<img id="quick-img">

<h2 id="quick-name"></h2>

<p id="quick-price"></p>

<button id="quick-add-cart">Add To Cart</button>
<button id="quick-view-btn">View Product</button>

</div>

</div>


<footer class="footer">

<p>© 2026 APEX Store</p>

</footer>

<script src="js/products.js"></script>

</body>

</html>
