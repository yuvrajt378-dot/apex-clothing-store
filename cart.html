<!DOCTYPE html>
<html>

<head>
<title>Cart</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<h1>Your Cart</h1>

<div id="cart"></div>

<a href="checkout.html">Checkout</a>

<script>

const cart=JSON.parse(localStorage.getItem("cart"))||[];

const container=document.getElementById("cart");

let total=0;

cart.forEach(item=>{

total+=item.price;

container.innerHTML+=`

<h3>${item.name}</h3>

<p>₹${item.price}</p>

<hr>

`;

});

container.innerHTML+=`<h2>Total ₹${total}</h2>`;

</script>

</body>
</html>
