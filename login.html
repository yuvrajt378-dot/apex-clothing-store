```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>APEX Store Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background-image:url("anime.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
}

/* login card */

.login-box{
width:350px;
padding:40px;
border-radius:15px;
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
box-shadow:0 0 25px rgba(0,0,0,0.6);
text-align:center;
color:white;
}

/* title */

.login-box h2{
margin-bottom:25px;
letter-spacing:2px;
}

/* inputs */

.input-box{
position:relative;
margin-bottom:20px;
}

.input-box input{
width:100%;
padding:12px 40px;
border:none;
border-radius:25px;
background:rgba(255,255,255,0.2);
color:white;
outline:none;
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
}

/* button */

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:#00f7ff;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
box-shadow:0 0 20px #00f7ff;
}

/* links */

.links{
margin-top:15px;
display:flex;
justify-content:space-between;
}

.links a{
color:white;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<div class="login-box">

<h2>APEX STORE</h2>

<form>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="Email" required>
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="Password" required>
</div>

<button class="login-btn">Login</button>

<div class="links">
<a href="#">Forgot Password?</a>
<a href="#">Register</a>
</div>

</form>

</div>

</body>
</html>
```
