<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product | APEX Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#6c63ff,#3a2fff);
}

/* BACK BUTTON */

.back{
position:absolute;
top:20px;
left:20px;
color:white;
text-decoration:none;
font-weight:500;
}

/* GLASS CARD */

.product-container{
width:900px;
display:flex;
gap:40px;
padding:40px;
border-radius:20px;

background:rgba(255,255,255,0.15);
backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.3);

box-shadow:0 20px 40px rgba(0,0,0,0.25);
color:white;
}

/* PRODUCT IMAGE */

.product-image img{
width:320px;
border-radius:16px;
}

/* PRODUCT DETAILS */

.product-details{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
}

.product-details h1{
font-size:36px;
margin-bottom:10px;
}

.price{
font-size:28px;
font-weight:600;
margin:10px 0;
}

.description{
opacity:0.9;
line-height:1.6;
margin-bottom:20px;
}

/* BUTTON */

.add-cart{
padding:14px 28px;
border:none;
border-radius:10px;
background:white;
color:#333;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.add-cart:hover{
transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

/* RESPONSIVE */

@media(max-width:768px){

.product-container{
flex-direction:column;
width:90%;
text-align:center;
}

.product-image img{
width:100%;
}

}

</style>

</head>

<body>

<a href="index.html" class="back">← Back to Store</a>

<div class="product-container">

<div class="product-image">
<img id="product-img">
</div>

<div class="product-details">

<h1 id="product-name"></h1>

<div class="price" id="product-price"></div>

<p class="description">
Premium quality anime streetwear from APEX Store.
Comfortable fabric, stylish design, and perfect for everyday wear.
</p>

<button class="add-cart" onclick="addToCart()">Add To Cart</button>

</div>

</div>

<script>

const product=JSON.parse(localStorage.getItem("product"));

document.getElementById("product-img").src=product.image;
document.getElementById("product-name").textContent=product.name;
document.getElementById("product-price").textContent="₹"+product.price;

function addToCart(){

let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push(product);

localStorage.setItem("cart",JSON.stringify(cart));

alert("Added to cart");

}

</script>

</body>
</html>
